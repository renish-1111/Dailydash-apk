workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.example.personalExpenseTracker"   # change this
    
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
    
      - name: Build IPA
        script: |
          flutter clean
          flutter build ipa --release
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - ponkiyarenish@gmail.com
